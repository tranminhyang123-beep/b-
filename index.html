<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Ultra Love</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Segoe UI", sans-serif;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size:400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 🎬 INTRO */
#intro{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#intro h1{
    font-size:40px;
    animation: zoom 2s infinite;
}

@keyframes zoom{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

/* 💌 CARD */
.card{
    width:90%;
    max-width:650px;
    background:rgba(255,255,255,0.92);
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    display:none;
}

.heart{
    font-size:60px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

.title{
    font-size:28px;
    color:#ff4d6d;
    font-weight:bold;
    margin-top:10px;
}

/* ✍️ STORY TEXT */
.line{
    margin-top:20px;
    font-size:20px;
    color:#444;
    min-height:40px;
    border-right:2px solid #ff4d6d;
    white-space:nowrap;
    overflow:hidden;
}

/* 💌 BUTTON */
.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    display:none;
}

/* 💖 HEARTS */
.heart-float{
    position:absolute;
    bottom:-50px;
    font-size:20px;
    animation: floatUp linear forwards;
}

@keyframes floatUp{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

/* 📖 POPUP LETTER */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:25px;
    border-radius:20px;
    max-width:400px;
    text-align:center;
    animation: pop 0.5s ease;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

/* 🎵 BUTTON */
.musicBtn{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#444;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    <h1>💖 Loading Love...</h1>
    <p>Just a moment...</p>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="" type="audio/mpeg">
</audio>

<!-- 💌 MAIN -->
<div class="card">

    <div class="heart">💖</div>

    <div class="title">Yang ❤️ Ly</div>

    <div class="line" id="line"></div>

    <button class="musicBtn" onclick="playMusic()">🎵 Bật nhạc</button>

    <button class="btn" id="btn" onclick="openPopup()">💌 Mở thư</button>

</div>

<!-- 📖 POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>💌 Gửi em</h2>
        <p>
            Anh không hoàn hảo...<br><br>
            Nhưng anh thật lòng thương em 🥺<br><br>
            Nếu được chọn lại, anh vẫn chọn em ❤️
        </p>
        <br>
        <button onclick="closePopup()">Đóng</button>
    </div>
</div>

<script>

const music = document.getElementById("bgMusic");

/* 🎬 intro */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.querySelector(".card").style.display="block";
},2500);

/* 🎵 music */
function playMusic(){
    music.play();
}

/* ✍️ story text */
const texts = [
    "Anh gặp em là định mệnh...",
    "Anh nhớ em mỗi ngày 🥺",
    "Không gì quan trọng hơn em ❤️",
    "Anh chỉ cần em thôi..."
];

let line = document.getElementById("line");
let i=0, j=0;

function type(){
    if(i < texts.length){
        if(j < texts[i].length){
            line.innerHTML += texts[i][j];
            j++;
            setTimeout(type,60);
        }else{
            setTimeout(()=>{
                line.innerHTML="";
                j=0;
                i++;
                type();
            },1200);
        }
    }else{
        document.getElementById("btn").style.display="inline-block";
    }
}

setTimeout(type,2500);

/* 💌 popup */
function openPopup(){
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* 💖 hearts */
function createHeart(){
    const h=document.createElement("div");
    h.className="heart-float";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*25)+"px";
    h.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
}

setInterval(createHeart,200);

</script>

</body>
</html>
